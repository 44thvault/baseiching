    const walletStatus = document.getElementById("walletStatus");
    const connectBtn = document.getElementById("connectBtn");
    const castBtn = document.getElementById("castBtn");
    const loadLastBtn = document.getElementById("loadLastBtn");
    const questionInput = document.getElementById("question");
    const resultPanel = document.getElementById("resultPanel");
    const hexName = document.getElementById("hexName");
    const hexNumber = document.getElementById("hexNumber");
    const hexLines = document.getElementById("hexLines");
    const hexMeaning = document.getElementById("hexMeaning");
    const lastCastInfo = document.getElementById("lastCastInfo");

    async function connectWallet() {
      if (!window.ethereum) {
        walletStatus.textContent = "MetaMask not found.";
        return;
      }

      try {
        provider = new ethers.BrowserProvider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        signer = await provider.getSigner();

        const network = await provider.getNetwork();
        const address = await signer.getAddress();

        walletStatus.textContent = `Connected: ${address} | Chain ID: ${network.chainId.toString()}`;

        contract = new ethers.Contract(contractAddress, abi, signer);
      } catch (err) {
        walletStatus.textContent = "Connection failed: " + err.message;
      }
    }

    function renderHexagram(num) {
      const hex = hexagrams[num];
      if (!hex) return;

      resultPanel.classList.remove("hidden");
      hexName.textContent = hex.name;
      hexNumber.textContent = `Hexagram ${num}`;
      hexLines.textContent = hex.lines;
      hexMeaning.textContent = hex.meaning;
    }

    async function castHexagram() {
      if (!contract) {
        walletStatus.textContent = "Connect wallet first.";
        return;
      }

      const question = questionInput.value.trim() || "No question given";

      try {
        walletStatus.textContent = "Sending transaction...";
        const tx = await contract.castHexagram(question);
        await tx.wait();

        walletStatus.textContent = "Transaction confirmed.";

        const last = await contract.getLastCast();
        const num = Number(last[1]);
        renderHexagram(num);

        lastCastInfo.textContent =
          `Last cast question: "${last[3]}" | Hexagram: ${num} | Seeker: ${last[0]}`;
      } catch (err) {
        walletStatus.textContent = "Cast failed: " + err.message;
      }
    }

    async function loadLastCast() {
      if (!window.ethereum) {
        lastCastInfo.textContent = "MetaMask not found.";
        return;
      }

      try {
        if (!provider) {
          provider = new ethers.BrowserProvider(window.ethereum);
        }

        const readContract = new ethers.Contract(contractAddress, abi, provider);
        const last = await readContract.getLastCast();
        const num = Number(last[1]);

        if (num < 1 || num > 64) {
          lastCastInfo.textContent = "No cast found yet.";
          return;
        }

        renderHexagram(num);

        const ts = Number(last[2]);
        const date = new Date(ts * 1000).toLocaleString();

        lastCastInfo.textContent =
          `Question: "${last[3]}" | Hexagram: ${num} | Wallet: ${last[0]} | Time: ${date}`;
      } catch (err) {
        lastCastInfo.textContent = "Could not load last cast: " + err.message;
      }
    }

    connectBtn.addEventListener("click", connectWallet);
    castBtn.addEventListener("click", castHexagram);
    loadLastBtn.addEventListener("click", loadLastCast);
